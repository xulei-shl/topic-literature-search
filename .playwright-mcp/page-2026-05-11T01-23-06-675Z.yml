      - link "《现代农业》 《现代农业》 《现代农业》创刊于1975年。现由内蒙古自治区农牧业科学院主管主办，《现代农业》编辑部出版双月刊，国内公开发行。多年来致力于传播农牧业科技创新成果，促进农牧业绿色、可持续发展。主要设置“乡村振兴”“农牧经济”“生态环保”等栏目，面向的读者和作者群体主要包括全国各省市自治区涉农涉牧高校教师、硕博士研究生、科研院所科技人员等，全年发文量180篇左右，基金论文占比58.33%，现已对标核心期刊，加大组稿约稿力度，进一步完善出版流程，严格审读和编校标准，实现题目、作者、摘要、关键词中英文双语出版。" [ref=e144] [cursor=pointer]:
