      - link "《IT经理世界》 《IT经理世界》 1998年3月，《IT经理世界》诞生。从创刊之日起，她就立志成为中国最好的商业管理杂志。从信息扶推动企业管理进步这个角度切入，《IT经理世界》逐渐进入了各个行业战略管理和运营层面，开始探讨信息产业，制造业，流通业，金融业等各个行业的企业所括外资企业，本土国有企业，民营企业等各种不同类型企业的经营管理问题。《IT经理世界》秉承了“观点前卫，立意严肃，谨慎求证，忠实记不”的一贯风格，致力于对当前中国工商界问题的独立判断及深刻剖析，是一份真正能够在中国企业发展过程中起到舆论引导作用的权威媒体。" [ref=e138] [cursor=pointer]:
