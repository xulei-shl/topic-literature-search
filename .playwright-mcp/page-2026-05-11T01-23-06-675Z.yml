            - /url: /Qikan/Article/Detail?id=7110900750
        - definition [ref=e99]:
          - generic [ref=e100]:
            - link "S.James" [ref=e101] [cursor=pointer]:
              - /url: /Qikan/Search/Index?key=A%3dS.James
            - link "Saranya R.Chandran" [ref=e102] [cursor=pointer]:
              - /url: /Qikan/Search/Index?key=A%3dSaranya%2bR.Chandran
            - link "M.Santosh" [ref=e103] [cursor=pointer]:
              - /url: /Qikan/Search/Index?key=A%3dM.Santosh
            - link "A.P.Pradeepkumar" [ref=e104] [cursor=pointer]:
              - /url: /Qikan/Search/Index?key=A%3dA.P.Pradeepkumar
            - link "M.N.Praveen" [ref=e105] [cursor=pointer]:
              - /url: /Qikan/Search/Index?key=A%3dM.N.Praveen
            - link "K.S Sajinkumar" [ref=e106] [cursor=pointer]:
              - /url: /Qikan/Search/Index?key=A%3dK.S%2bSajinkumar
          - link "《Energy Geoscience》" [ref=e108] [cursor=pointer]:
            - /url: /Qikan/Journal/Summary?kind=1&gch=59371X
          - generic [ref=e109]: 2022年第2期136-146,共11页
        - definition [ref=e110]: The ever-increasing recovery rate of natural resources from terrestrial impact craters over the last fewdecades across the globe offers new avenues for further exploration of mineral and hydrocarbon resources in such settings.As of today,60 of the 208 terrestrial craters have been identified to host diverseresources such as hydrocarbons,metals and construction materials.The potential of craters as plausibleresource contributors to the energy sector is therefore,worthy of consideration,as 42(70%)of the 60craters host energy resources such as oil,gas,coal,uranium,mercury,critical and major minerals as wellas hydropower resources.Among others,19 craters are of well-developed hydrocarbon reserves.Mineraldeposits associated with craters are also classified similar to other mineral resources such as progenetic,syngenetic and epigenetic sources.Of these,the progenetic and syngenetic mineralization are confinedto the early and late excavation stage of impact crater evolution,respectively,whereas epigenetic deposits are formed during and after the modification stage of crater formation.Thus,progenetic andsyngenetic mineral deposits(like Fe,Ni,Pb,Zn and Cu)associated with craters are formed as a directresult of the impact event,whereas epigenetic deposits(e.g.hydrocarbon)are hosted by the impactstructure and result from post-impact processes.In the progenetic and syngenetic deposits,the shockwave induced fracturing and melting aid the formation of deposits,whereas in the epigenetic deposits,the highly fractured lithostratigraphic units of higher porosity and permeability,like the centralelevated area(CEA)or the rim,act as traps.In this review,we provide a holistic view of the mineral andenergy resources associated with impact craters,and use some of the remote sensing techniques toidentify the mineral deposits as supplemented by a schematic model of the types of deposits formedduring cratering process.
