        - definition [ref=e131]: 大道至简,实干为要。习近平总书记在党的二十大报告中强调,牢记空谈误国、实干兴邦。“学以致用”是“实干”的基本要求,也是伟大的思想家严复留给人类的精神财富之一。学以致用,通俗理解就是为了实际应用而学习,并将学到的理论知识结合实际情况运用到生活或工作中,在实践过程中针对性地解决遇到的新问题,从而进一步完善理论。严复“代表了在中国共产党出世以前向西方寻找真理的一派人物”(摘自《毛泽东选集》合订本第1358页),是“中国近代思想文化史上里程碑式的巨人”(摘自1993年习近平同志为《严复国际学术研讨会论文集》所作的序言)。
