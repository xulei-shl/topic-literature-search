      - link "《智能城市》 《智能城市》 《智能城市》杂志是由国家新闻出版广电总局批准，辽宁省科学情报所承办的国内外公开发行的期刊。本刊拟抓住国家推广智慧城市建设这一契机，通过平面媒体平台加以引导和宣传，深度参与智能城市建设与发展进程，打造智能城市的品牌企业。本刊力争打造成为中文版的PLOS ONE，成为全领域的智慧综合性期刊。 1.本刊特色 本刊立足于智能城市施工、智能机器制造、智能家居、智能交通、智能医疗、智能安防、智能电网、智能环保、智能农业、智能金融等领域的科技与实用相结合，通过深度文章分享、学术研究探讨、智能潮流引导及领先技术方案等立图打造一本全方位系统阐述创建智能城市原理和方向的平面媒体。 2.办刊宗旨 本刊以系统工程学科理论为基础，集中反映建筑、环境与控制等学科交叉的复合型研究领域的学术成果与技术动向，探讨智能建筑理论和技术热点，服务智能城市建设与发展。" [ref=e148] [cursor=pointer]:
        - /url: /Qikan/Journal/Summary?kind=1&gch=72146X&from=index
        - img "《智能城市》" [ref=e150]
