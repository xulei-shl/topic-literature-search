    - generic [ref=e141]:
      - link "《生态学报》 《生态学报》 《生态学报》报道生态学领域前沿理论和原始创新性研究成果。坚持百花齐放、百家争鸣、产生于科学性、立足于学术性、着眼于实践性、服务于社会性的办刊理念，依靠和团结广大生态学科研工作者，探索生态学奥秘，为生态学基础理论研究搭建交流平台，促进生态学研究深入发展，为我国培养和造就生态学科研人才，为国民经济建设和发展提供知识创新服务。《生态学报》是生态学研究国内最大的学术交流平台，为我国生态学研究服务于社会经济发展创造了能用、有用和管用的科学效益。《生态学报》主要报道生态学及各分支学科的重要基础理论和应用研究的原始创新性科研成果；特别欢迎能反映现代生态学发展方向的优秀综述文章；研究简报；生态学新理论、新方法、新技术介绍；新书评价和学术、科研动态、生态学国际大会及开放实验室介绍等。" [ref=e142] [cursor=pointer]:
        - /url: /Qikan/Journal/Summary?kind=1&gch=90772X&from=index
        - img "《生态学报》" [ref=e144]
