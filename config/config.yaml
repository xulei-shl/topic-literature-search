# 目标表的所有列（顺序可按需调整）
target_fields:
  - 题名
  - 作者
  - 机构
  - 刊名
  - 摘要
  - 发表时间
  - 年份
  - 学位年度
  - 页码
  - 关键词
  - 中图分类号
  - ISSN
  - DOI
  - 网址
  - 参考格式
  - 基金
  - 卷
  - 期
  - 第一责任人
  - CN
  - 核心类型
  - 授予学位
  - 学位授予单位
  - 导师
  - 会议名称
  - 母体文献
  - 来源库
  - 检索数据库

# 三个源文件的字段 → 目标字段的映射
source_mappings:
  cnki:
    SrcDatabase-来源库: 来源库
    Title-题名: 题名
    Author-作者: 作者
    Organ-单位: 机构
    Source-文献来源: 刊名
    Summary-摘要: 摘要
    PubTime-发表时间: 发表时间
    FirstDuty-第一责任人: 第一责任人
    Year-年: 年份
    Period-期: 期
    PageCount-页码: 页码
    CLC-中图分类号: 中图分类号
    ISSN-国际标准刊号: ISSN
    URL-网址: 网址
    DOI-DOI: DOI
    参考格式: 参考格式
    Keyword-关键词: 关键词
    Volume-卷: 卷
    Fund-基金: 基金
    # CNKI 没有序号、CN、核心类型等，这些列自动留空

  wanfang:
    题名: 题名
    作者: 作者
